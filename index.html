<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morte Violenta Intencional</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f2f46">

  <script src="jspdf.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      background: #f8f9fa;
    }

    h2 {
      background: #1f2f46;
      color: white;
      padding: 12px;
      border-radius: 5px;
    }

    h3 {
      color: #1f2f46;
      margin-top: 30px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    textarea {
      min-height: 80px;
    }

    .info-fixa {
      background: #eef1f5;
      padding: 12px;
      border-radius: 6px;
      margin-top: 10px;
      color: #1f2f46;
      font-weight: bold;
    }
    .titulo-vitima {
      background: #072d64;
      color: white;
      padding: 10px;
      border-radius: 5px;
    }

    button {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-pdf {
      background: #e60505;
    }

    .btn-limpar {
      background: #6c757d;
    }

    .btn-gps {
      background: #198754;
    }
    .btn-vitimas{
      background: #092e61;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      color: gray;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Morte Violenta Intencional</h2>

<form id="form">
<h3>Dados Adicionais da Perícia</h3>

<label>Protocolo CAD/CIODS</label>
<input type="text" id="protocolo" placeholder="Número do protocolo">

<label>Circunscrição</label>
<input type="text" id="circunscricao" placeholder="Circunscrição">

<label>Data da perícia</label>
<input type="date" id="dataPericia">

<label>Local principal</label>
<input type="text" id="localPrincipal" placeholder="Ex: via pública, bar, residência">

<label>Rua</label>
<input type="text" id="rua" placeholder="Nome da rua">

<label>Número</label>
<input type="text" id="numero" placeholder="Número ou S/N">

<label>Bairro</label>
<input type="text" id="bairro" placeholder="Nome do bairro">

<label>Cidade</label>
<input type="text" id="cidade" placeholder="Nome da cidade">

<label>Estado</label>
<input type="text" id="estado" placeholder="UF">

<h3>Informações Gerais</h3>

<label>Data do acionamento</label>
<input type="date" id="dataAcionamento">
  
<label>GPS</label>
<input type="text" id="gps" placeholder="Coordenadas GPS">

<button type="button" class="btn-gps" onclick="capturarGPS()">
  Capturar GPS
</button>

<h3>Características do Local</h3>

<label>Tipo de pavimento</label>
<input type="text" id="pavimento" placeholder="Ex: asfalto, paralelepípedo">

<label>Número de faixas</label>
<input type="number" id="faixas" placeholder="Quantidade de faixas">

<label>Tipo de iluminação</label>
<input type="text" id="iluminacao" placeholder="Ex: pública, ausente">

<label>Tipo de visibilidade durante a perícia</label>
<input type="text" id="visibilidade" placeholder="Ex: boa, reduzida">

<label>Tipo de acesso</label>
<input type="text" id="acesso" placeholder="Ex: via pública, propriedade privada">

<label>Tipo de imóvel predominante ao redor</label>
<input type="text" id="imovelPredominante" placeholder="Ex: residencial, comercial">

<h3>Informações sobre Câmeras</h3>

<label>Tipo de câmeras</label>
<input type="text" id="tipoCamera" placeholder="Ex: pública, particular">

<label>Posição da câmera</label>
<input type="text" id="posicaoCamera" placeholder="Localização">

<label>Distância da câmera ao cadáver</label>
<input type="text" id="distanciaCamera" placeholder="Em metros">

<h3>Perito e Horários</h3>

<label>Nome do Perito</label>
<input type="text" id="perito">
<label>Matrícula do Perito</label>
<input type="text" id="matriculaPerito">


<label>Hora da chegada ao local</label>
<input type="time" id="horaChegada">

<label>Hora do fim da perícia</label>
<input type="time" id="horaFim">

<label>Finalizada no mesmo dia?</label>
<select id="mesmoDia">
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
</select>

<h3>Delegado Responsável</h3>

<label>Nome do delegado responsável</label>
<input type="text" id="nomeDelegado" placeholder="Nome completo">

<label>Matrícula do delegado</label>
<input type="text" id="matriculaDelegado" placeholder="Número da matrícula">

<h3>Isolamento do Local</h3>

<label>O local estava isolado?</label>
<select id="localIsolado">
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
 </select>

<label>Tipo de polícia responsável pelo isolamento</label>
<input type="text" id="policiaIsolamento" placeholder="Ex: PM, PC">

<label>Nome e patente/cargo do responsável</label>
<input type="text" id="responsavelIsolamento" placeholder="Nome e patente">

<label>Matrícula do responsável</label>
<input type="text" id="matriculaResponsavel" placeholder="Número da matrícula">

<label>O local estava preservado?</label>
<select id="localPreservado">
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
  <option>Parcialmente</option>
 </select>

<h3>Vestígios Encontrados</h3>

<label>Vestígio 1</label>
<textarea id="vestigio1" placeholder="Descrição do vestígio"></textarea>

<label>Vestígio 2</label>
<textarea id="vestigio2" placeholder="Descrição do vestígio"></textarea>

<label>Vestígio 3</label>
<textarea id="vestigio3" placeholder="Descrição do vestígio"></textarea>

<label>Vestígio 4</label>
<textarea id="vestigio4" placeholder="Descrição do vestígio"></textarea>

<h4 class="titulo-vitima">Vítimas do homicídio</h4>

    <label>Quantidade de vítimas</label>
    <input type="number" id="qtdEnvolvidos" min="1" placeholder="Digite o número de vítimas">

    <button type="button" class="btn-vitimas" onclick="gerarEnvolvidos()">+ Gerar vitimas</button>

    <div id="areaEnvolvidos"></div>

<label>O delegado responsável entregou os pertences aos familiares?</label>
<select id="entregaPertences">
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
  <option>Não informado</option>
  <option>Não se aplica</option>
</select>

<label>Observações</label>
<textarea id="observacoes" placeholder="Campo livre para digitar observações específicas deste caso"></textarea>
  
<button type="button" class="btn-pdf" onclick="gerarPDF()">
Gerar PDF
</button>

<button type="button" class="btn-limpar" onclick="limparDados()">
Limpar dados
</button>

</form>

<footer>
  © Perito Meirere
</footer>

<script>
const campos = document.querySelectorAll("input, select, textarea");

campos.forEach(campo => {
  const valorSalvo = localStorage.getItem(campo.id);

  if (valorSalvo !== null) {
    campo.value = valorSalvo;
  }

  campo.addEventListener("input", () => {
    localStorage.setItem(campo.id, campo.value);
  });
});

function ativarSalvamento(seletor) {
  document.querySelectorAll(`${seletor} input, ${seletor} select, ${seletor} textarea`)
    .forEach(campo => {
      const valorSalvo = localStorage.getItem(campo.id);

      if (valorSalvo !== null) {
        campo.value = valorSalvo;
      }

      campo.addEventListener("input", () => {
        localStorage.setItem(campo.id, campo.value);
      });

      campo.addEventListener("change", () => {
        localStorage.setItem(campo.id, campo.value);
      });
    });
}

function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const nomePerito = document.getElementById("perito").value || "Meirere Lucio Pereira";
  const matPerito = document.getElementById("matriculaPerito").value || "387.064-2";

  let texto = "MORTE VIOLENTA INTENCIONAL\n\n";
  texto += `Perito responsável: ${nomePerito} (mat. ${matPerito})\n\n`;

  document.querySelectorAll("input, select, textarea").forEach(el => {
    if (el.value) {
      const label = el.previousElementSibling ? el.previousElementSibling.innerText : el.id;
      texto += label + ": " + el.value + "\n\n";
    }
  });

  const linhas = doc.splitTextToSize(texto, 180);
  let y = 10;

  linhas.forEach(linha => {
    if (y > 280) {
      doc.addPage();
      y = 10;
    }

    doc.text(linha, 10, y);
    y += 7;
  });

  const data = document.getElementById("dataPericia").value || document.getElementById("dataAcionamento").value || "sem_data";
  doc.save(`morte_violenta_intencional_${data}.pdf`);
}

function limparDados() {
  const confirmar = confirm("Tem certeza que deseja apagar todos os dados preenchidos?");

  if (confirmar) {
    localStorage.clear();
    alert("Dados apagados com sucesso.");
    location.reload();
  }
}
function gerarEnvolvidos() {
  const qtd = Number(document.getElementById("qtdEnvolvidos").value);
  const area = document.getElementById("areaEnvolvidos");

  area.innerHTML = "";

  for (let i = 1; i <= qtd; i++) {
    area.innerHTML += `
      <div>
        <h3 class="titulo-vitima">Vítima ${i}</h3>

        <label>Nome da vítima ${i}</label>
        <input type="text" id="nome${i}">
        <label>Mãe da vítima ${i}</label>
        <input type="text" id="mae${i}">
        <label>Pai da vítima ${i}</label>
        <input type="text" id="pai${i}">
        <label>RG da vítima ${i}</label>
        <input type="text" id="RG${i}">
        <label>CPF da vítima ${i}</label>
        <input type="text" id="CPF${i}">
        <label>Data de nascimento vítima ${i}</label>
        <input type="date" id="dataNascimento${i}">
        <label>NIC da vítima ${i}</label>
        <input type="text" id="nic${i}">
        <label>idade aparente da vítima ${i}</label>
        <input type="text" id="idade${i}">
        <label>Vestes da vítima ${i}</label>
        <input type="text" id="veste${i}">
        <label>Sexo da vítima ${i}</label>
        <select id="sexo${i}">
          <option>Masculino</option>
          <option>Feminino</option>
          <option>Ignorado</option>
        </select>
        <label>Cutis da vítima ${i}</label>
        <input type="text" id="cutis${i}" placeholder="Ex: negra, parda, branca, amarela, indígena">
        <label>Decúbito da vítima ${i}</label>
        <input type="text" id="decubito${i}" placeholder="Ex: dorsal, ventral, lateral direito, lateral esquerdo">
        <label>Tipo de solo da vítima ${i}</label>
        <input type="text" id="tipoSolo${i}" placeholder="Descrição do tipo de solo">
        <label>Lesões da vítima ${i}</label>
        <input type="text" id="Lesoes${i}" placeholder="Descrever lesões visíveis, localização anatômica e características gerais">
        <label>Pertences da vítima ${i}</label>
        <input type="text" id="pertence${i}">

      </div>
    `;
  }
  ativarSalvamento("#areaEnvolvidos");
}

function capturarGPS() {

  if (!navigator.geolocation) {
    alert("Geolocalização não suportada.");
    return;
  }

  navigator.geolocation.getCurrentPosition(

    position => {

      const latitude = position.coords.latitude.toFixed(6);
      const longitude = position.coords.longitude.toFixed(6);
      const precisao = position.coords.accuracy.toFixed(1);

      const gps =
        `${latitude}, ${longitude} | precisão aprox.: ${precisao} m`;

      document.getElementById("gps").value = gps;

      localStorage.setItem("gps", gps);
    },

    error => {

      alert(
        "Não foi possível capturar o GPS automaticamente.\n\n" +
        "Você pode preencher manualmente."
      );
    },

    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    } 
  );
}
window.addEventListener("load", () => {
  if (localStorage.getItem("qtdEnvolvidos")) {
    gerarEnvolvidos();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
