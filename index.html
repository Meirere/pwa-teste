<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perícia de Trânsito</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#dc3545">

  <script src="jspdf.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      background: #f8f9fa;
    }

    .titulo-envolvido {
      background: #072d64;
      color: white;
      padding: 10px;
      border-radius: 5px;
    }

    .titulo-veiculo {
      background: #158606;
      color: white;
      padding: 10px;
      border-radius: 5px;
    }

    h2 {
      background: #dc3545;
      color: white;
      padding: 10px;
      border-radius: 5px;
    }
 
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      background: #dc3545;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 8px;
    }

    .btn-limpar {
      background: #6c757d;
    }
    .btn-veiculos {
      background: #158606;
    }
    .btn-envolvidos {
      background: #072d64;
    }
  </style>
</head>

<body>

<h2>Perícia de Trânsito</h2>

<form id="form">

<label>Data do acionamento</label>
<input type="date" id="data">

<label>Protocolo CIODS</label>
<input type="text" id="ciods">

<label>Hora da chegada</label>
<input type="time" id="chegada">

<label>Hora do fim</label>
<input type="time" id="fim">

<label>Finalizada no mesmo dia?</label>
<select id="mesmoDia">
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Tipo de via</label>
<select id="tipoVia">
  <option>Urbana</option>
  <option>Rural</option>
</select>

<label>Classificação da via</label>
<input type="text" id="classificacao">

<label>Endereço / KM</label>
<input type="text" id="endereco">

<label>GPS</label>
<input type="text" id="gps">

<label>Cidade</label>
<input type="text" id="cidade">

<label>Circunscrição</label>
<input type="text" id="circ">

<label>Polícia do isolamento</label>
<input type="text" id="policia">

<label>Cargo do policial</label>
<input type="text" id="cargo">

<label>Nome do policial</label>
<input type="text" id="nomePolicial">

<label>Matrícula</label>
<input type="text" id="matricula">

<label>Tipo de pavimento</label>
<input type="text" id="pavimento">

<label>Estado da estrada</label>
<input type="text" id="estado">

<label>Topografia</label>
<input type="text" id="topografia">

<label>Trecho</label>
<select id="trecho">
  <option>Reta</option>
  <option>Curva</option>
</select>

<label>Número de faixas</label>
<input type="number" id="faixas">

<label>Sentido das vias</label>
<input type="text" id="sentidoVia">

<label>Turno</label>
<select id="turno">
  <option>Matutino</option>
  <option>Vespertino</option>
  <option>Noite</option>
</select>

<label>Iluminação</label>
<select id="iluminacao">
  <option>Pública</option>
  <option>Privada</option>
</select>

<label>Visibilidade</label>
<input type="text" id="visibilidade">

<label>Pista</label>
<select id="pista">
  <option>Seca</option>
  <option>Molhada</option>
</select>

<label>Tráfego</label>
<select id="trafego">
  <option>Leve</option>
  <option>Moderado</option>
  <option>Intenso</option>
</select>

<label>Ladeamento</label>
<input type="text" id="ladeamento">

<label>Há câmeras?</label>
<select id="cameras">
  <option>Sim</option>
  <option>Não</option>
</select>


<h4 class="titulo-envolvido">Envolvidos no Sinistro</h4>

    <label>Quantidade de envolvidos</label>
    <input type="number" id="qtdEnvolvidos" min="1" placeholder="número de condutores+passageiros">

    <button type="button" class="btn-envolvidos" onclick="gerarEnvolvidos()">Gerar envolvidos</button>

    <div id="areaEnvolvidos"></div>

<h3 class="titulo-veiculo">Veículos Envolvidos</h3>

    <label>Quantidade de veículos</label>
    <input type="number" id="veicEnvolvidos" min="1">

    <button type="button" class="btn-veiculos" onclick="gerarVeiculosEnvolvidos()">Gerar veículos envolvidos</button>

    <div id="veiculosEnvolvidos"></div>

<label>Vestígios na via</label>
<textarea id="via"></textarea>

<label>Vestígios nos cadáveres</label>
<textarea id="cadaver"></textarea>

<button type="button"
        class="btn-limpar"
        onclick="limparDados()">
  Apagar Dados
</button>
<button type="button" onclick="gerarPDF()">Gerar PDF</button>

</form>


<script>

const campos = document.querySelectorAll("input, select, textarea");

campos.forEach(campo => {

  const valorSalvo = localStorage.getItem(campo.id);

  if (valorSalvo !== null) {
    campo.value = valorSalvo;
  }

  campo.addEventListener("input", () => {
    localStorage.setItem(campo.id, campo.value);
  });

});

function ativarSalvamento(seletor) {
  document.querySelectorAll(`${seletor} input, ${seletor} select, ${seletor} textarea`)
    .forEach(campo => {
      const valorSalvo = localStorage.getItem(campo.id);

      if (valorSalvo !== null) {
        campo.value = valorSalvo;
      }

      campo.addEventListener("input", () => {
        localStorage.setItem(campo.id, campo.value);
      });

      campo.addEventListener("change", () => {
        localStorage.setItem(campo.id, campo.value);
      });
    });
}

function gerarEnvolvidos() {
  const qtd = Number(document.getElementById("qtdEnvolvidos").value);
  const area = document.getElementById("areaEnvolvidos");

  area.innerHTML = "";

  for (let i = 1; i <= qtd; i++) {
    area.innerHTML += `
      <div>
        <h3 class="titulo-envolvido">Envolvido ${i}</h3>

        <label>Categoria do Envolvido ${i}</label>
        <select id="categoria${i}">
          <option>Condutor</option>
          <option>Passageiro</option>
          <option>Pedestre</option>
        </select>

        <label>Nome do Envolvido ${i}</label>
        <input type="text" id="nome${i}">
      </div>
    `;
  }
  ativarSalvamento("#areaEnvolvidos");
}

function gerarVeiculosEnvolvidos() {
  const qtd = Number(document.getElementById("veicEnvolvidos").value);
  const area = document.getElementById("veiculosEnvolvidos");

  area.innerHTML = "";

  for (let i = 1; i <= qtd; i++) {
    area.innerHTML += `
      <div>
        <h3 class="titulo-veiculo">Veículo ${i}</h3>

        <label>Veículo ${i}</label>
        <select id="tipo${i}" onchange="mostrarOutro(${i})">
          <option>Caminhão</option>
          <option>Automóvel</option>
          <option>Motocicleta</option>
          <option>Outro</option>
        </select>
        <div id="outroDiv${i}" style="display:none;">
          <label>Tipo de veículo:</label>
          <input type="text" id="outroTipo${i}" placeholder="automóvel, carroça, bicicleta, etc" >
        </div>
        
        <label>Sentido de tráfego veículo${i}</label>
        <input type="text" id="sentidoVeic${i}">

        <label>Vestígio veículo${i}</label>
        <input type="text" id="vestigios${i}">
        
        <label>Placa do Envolvido ${i}</label>
        <input type="text" id="placa${i}">
      </div>
    `;
  }
  ativarSalvamento("#veiculosEnvolvidos");
}

function mostrarOutro(i) {
  const tipo = document.getElementById(`tipo${i}`);
  const divOutro = document.getElementById(`outroDiv${i}`);

  if (tipo.value === "Outro") {
    divOutro.style.display = "block";
  } else {
    divOutro.style.display = "none";
  }
}

function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let texto = "";

  document.querySelectorAll("input, select, textarea").forEach(el => {
    if (el.value) {
      texto += el.previousElementSibling.innerText + ": " + el.value + "\n\n";
    }
  });

  const linhas = doc.splitTextToSize(texto, 180); // quebra o texto

  let y = 10;

  linhas.forEach(linha => {
    if (y > 280) { // cria nova página
      doc.addPage();
      y = 10;
    }
    doc.text(linha, 10, y);
    y += 7;
  });

  const data = document.getElementById("data").value;
  doc.save(`pericia_transito_${data}.pdf`);
}
window.addEventListener("load", () => {
  if (localStorage.getItem("qtdEnvolvidos")) {
    gerarEnvolvidos();
  }

  if (localStorage.getItem("veicEnvolvidos")) {
    gerarVeiculosEnvolvidos();
  }
});
function limparDados() {

const confirmar = confirm(
  "Tem certeza que deseja apagar todos os dados preenchidos?"
);

if (confirmar) {

  localStorage.clear();

  alert("Dados apagados com sucesso.");

  location.reload();

}

}


</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
